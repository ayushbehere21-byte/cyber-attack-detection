<!DOCTYPE html>
<html>
<head>

<title>Admin Login</title>

<style>

body{
font-family:Arial;
background:#020617;
color:white;
margin:0;
text-align:center;
}

.header{
padding:30px;
font-size:28px;
font-weight:bold;
border-bottom:1px solid #1e293b;
}

.container{
margin-top:80px;
}

form{
background:#0f172a;
display:inline-block;
padding:30px;
border-radius:10px;
box-shadow:0 0 15px rgba(0,0,0,0.6);
}

input{
padding:10px;
margin:10px;
width:220px;
border:none;
border-radius:6px;
}

button{
padding:10px 20px;
border:none;
border-radius:6px;
background:#38bdf8;
color:black;
font-weight:bold;
cursor:pointer;
}

button:hover{
background:#0ea5e9;
}

.message{
color:#ef4444;
margin-top:10px;
}

</style>

</head>

<body>

<div class="header">
Admin Dashboard Login
</div>

<div class="container">

<form method="POST">

<div>
<input type="text" name="username" placeholder="Admin Username">
</div>

<div>
<input type="password" name="password" placeholder="Admin Password">
</div>

<button type="submit">Login</button>

</form>

<div class="message">
{{ message }}
</div>

</div>

</body>
</html>
