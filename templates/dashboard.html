<!DOCTYPE html>
<html>
<head>
<title>Cyber Security Dashboard</title>

<style>

body{
font-family: Arial;
background: #020617;
color: white;
margin:0;
}

.header{
background:#020617;
padding:20px;
text-align:center;
font-size:28px;
font-weight:bold;
border-bottom:1px solid #1e293b;
}

.container{
display:flex;
justify-content:center;
gap:30px;
margin-top:60px;
}

.card{
background:#0f172a;
padding:30px;
width:250px;
border-radius:12px;
text-align:center;
box-shadow:0 0 20px rgba(0,0,0,0.6);
}

.card h2{
font-size:18px;
margin-bottom:15px;
}

.number{
font-size:40px;
font-weight:bold;
color:#38bdf8;
}

.attack{
color:#ef4444;
}

.phishing{
color:#22c55e;
}

.ip-section{
margin-top:60px;
text-align:center;
}

.ip-box{
background:#0f172a;
width:400px;
margin:auto;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.5);
font-family: monospace;
color:#38bdf8;
}

.footer{
text-align:center;
margin-top:80px;
font-size:14px;
color:#94a3b8;
}

</style>

</head>

<body>

<div class="header">
AI Cyber Attack Detection Dashboard
</div>

<div class="container">

<div class="card">
<h2>Total Login Attempts</h2>
<div class="number">{{ attempts }}</div>
</div>

<div class="card">
<h2>Detected Attacks</h2>
<div class="number attack">{{ attacks }}</div>
</div>

<div class="card">
<h2>Phishing Checks</h2>
<div class="number phishing">{{ phishing }}</div>
</div>

</div>

<div class="ip-section">

<h2>Recent Attacker IP Logs</h2>

<div class="ip-box">
{% if ip_logs %}
<pre>{{ ip_logs }}</pre>
{% else %}
No attacker IP detected yet
{% endif %}
</div>

</div>

  <canvas id="attackChart"
        data-attempts="{{ attempts }}"
        data-attacks="{{ attacks }}"
        data-phishing="{{ phishing }}">
</canvas>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>

const canvas = document.getElementById('attackChart');

const loginAttempts = parseInt(canvas.dataset.attempts) || 0;
const attackCount = parseInt(canvas.dataset.attacks) || 0;
const phishingCount = parseInt(canvas.dataset.phishing) || 0;

new Chart(canvas, {
    type: 'bar',
    data: {
        labels: ['Login Attempts', 'Detected Attacks', 'Phishing Checks'],
        datasets: [{
            label: 'Security Activity',
            data: [loginAttempts, attackCount, phishingCount],
            borderWidth: 1
        }]
    }
});

</script>

<div class="footer">
Real-Time Cyber Security Monitoring System
</div>

</body>
</html>
