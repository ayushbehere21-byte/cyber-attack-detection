<!DOCTYPE html>
<html>
<head>

<title>Admin Dashboard Login</title>

<style>

body{
font-family:Arial;
background:#020617;
color:white;
margin:0;
text-align:center;
}

/* HEADER */

.header{
padding:30px;
font-size:28px;
font-weight:bold;
border-bottom:1px solid #1e293b;
color:#38bdf8;
}

/* CONTAINER */

.container{
margin-top:80px;
}

/* LOGIN FORM */

form{
background:#0f172a;
display:inline-block;
padding:35px;
border-radius:10px;
box-shadow:0 0 20px rgba(0,0,0,0.6);
}

/* INPUT */

input{
padding:12px;
margin:12px;
width:240px;
border:none;
border-radius:6px;
outline:none;
}

/* BUTTON */

button{
padding:12px 25px;
border:none;
border-radius:6px;
background:#38bdf8;
color:black;
font-weight:bold;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#0ea5e9;
transform:scale(1.05);
}

/* MESSAGE */

.message{
color:#ef4444;
margin-top:15px;
font-size:16px;
}

/* FOOTER */

.footer{
margin-top:80px;
font-size:14px;
color:#94a3b8;
}

</style>

</head>

<body>

<div class="header">
Admin Dashboard Login
</div>

<div class="container">

<form method="POST">

<div>
<input type="text" name="username" placeholder="Admin Username" required>
</div>

<div>
<input type="password" name="password" placeholder="Admin Password" required>
</div>

<button type="submit">Login</button>

</form>

<div class="message">
{{ message }}
</div>

</div>

<div class="footer">
Cyber Security Monitoring System
</div>

</body>
</html>
